name: Lint and Test

on:
    push:
        branches: ["master"]
        tags: ["*"]
    pull_request:
        branches: ["master"]

jobs:
    lint:
        runs-on: ubuntu-latest
        name: Lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"
                  cache: "maven"

            - name: Run Lint
              run: make lint

    test:
        runs-on: ubuntu-latest
        name: Test
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  java-version: "21"
                  distribution: "temurin"
                  cache: "maven"

            - name: Run Tests
              run: make test
